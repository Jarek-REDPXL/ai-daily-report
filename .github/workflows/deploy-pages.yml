name: Deploy site to GitHub Pages

# DISABLED by default. GitHub Pages cannot publish a PRIVATE repo on the free
# plan, so this deploy fails on every push. The site runs fine locally
# (`python -m http.server`) — a live URL is optional.
#
# To turn the live site ON later, do ONE of:
#   - make this repo public (Settings -> General -> Change visibility), or
#   - upgrade to GitHub Pro (private Pages),
# then Settings -> Pages -> Source: "GitHub Actions", restore the `push`
# trigger below, and re-run.
on:
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # the whole repo is a static site
      - id: deployment
        uses: actions/deploy-pages@v4
