name: Daily AI Briefing

# SCHEDULE ENABLED — runs daily at 06:00 UTC (~07:00 Europe/London) and on-demand.
# Runs the SAME spec as the Claude "AI NEWS" cloud routine (docs/NORTH-STAR.md +
# docs/prompts/daily.md), then the project quality gate (scripts/check_reports.py) so
# it can NEVER publish broken/stale derived data.
# ⚠ ONE ENGINE ONLY: with this schedule on, the Claude.ai cloud routine must be
# DISABLED — otherwise both generate the same day's report and collide.
#
# AUTH GUARDRAIL: the Claude step authenticates with claude_code_oauth_token
# (CLAUDE_CODE_OAUTH_TOKEN) so a run bills the Max subscription, NOT the paid API.
# Wire ONLY the OAuth token — do NOT add anthropic_api_key to the step and do NOT put
# ANTHROPIC_API_KEY in the job env; if the API key is present it takes precedence and
# billing goes to the paid API. ANTHROPIC_API_KEY stays a manual fallback secret.
#
# Secrets needed: CLAUDE_CODE_OAUTH_TOKEN (auth) + CRON_SECRET (feedback-read).
# To pause the schedule, comment out the `schedule:` block under `on:` (keep workflow_dispatch).
on:
  workflow_dispatch:        # run on-demand from the Actions tab (pick the branch)
  schedule:
    - cron: "17 6 * * *"    # ~06:17 UTC (~07:17 London) — off the congested top-of-hour

permissions:
  contents: write           # native GITHUB_TOKEN push to the run's branch
  id-token: write           # lets claude-code-action fetch its OIDC token
  issues: write             # open a tracking issue when a scheduled run fails (alerting)

concurrency:
  group: ai-edge-publish   # shared with weekly so the two never push concurrently
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install PDF deps
        run: pip install --quiet reportlab

      # Ingestion funnel (Phase 1): harvest hundreds of items from the curated
      # registry into redpxl.signals + a local harvest-digest.md the Claude step
      # reads FIRST. FAIL-SOFT — a dead feed/collector or missing secret logs and
      # is skipped; ingestion NEVER blocks the publish run (the routine falls back
      # to web search). DATABASE_URL persists signals (clustering in Phase 2);
      # FINNHUB_API_KEY enables the markets collector (both optional).
      - name: Harvest source signals (ingestion funnel)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install --quiet -r scripts/collectors/requirements.txt || echo "collector dep install issue — continuing fail-soft"
          python scripts/collectors/ingest.py || echo "ingest failed — continuing fail-soft (routine will web-search instead)"

      # Cluster + corroborate (Phase 2): embed the harvest, group near-duplicate
      # stories (same story from many outlets = corroboration), score, and emit
      # clusters-digest.md (tens of ranked, corroborated clusters). FAIL-SOFT —
      # without OPENAI_API_KEY/DATABASE_URL it skips and the routine falls back to
      # the unclustered harvest-digest.md.
      - name: Cluster, corroborate & curate sources
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/collectors/cluster.py || echo "cluster step failed — continuing fail-soft"
          python scripts/collectors/curate_sources.py || echo "source-curation step failed — continuing fail-soft"

      # Close the feedback loop (Phase 1): turn the team's demand signals into Brain
      # `gaps` rows — unmatched Ask questions (ask_no_match) + low-rated cards/reports
      # (low_rating) — deduped against open gaps, then emit gaps-digest.md the routine
      # reads below. Runs CI-side with direct DATABASE_URL, so the demand reaches the
      # routine even if the live /api/intake read is unavailable. FAIL-SOFT — without
      # DATABASE_URL (or before the 006_brain.sql migration is live) it logs and skips.
      - name: Sync team feedback into Brain gaps (close the loop)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install --quiet "psycopg[binary]" || echo "psycopg install issue — continuing fail-soft"
          python scripts/collectors/gaps_sync.py || echo "gaps_sync failed — continuing fail-soft"

      - name: Generate today's briefing with Claude
        uses: anthropics/claude-code-action@v1
        env:
          # Lets daily.md's feedback-read call /api/intake (Bearer). Step-scoped
          # ONLY — never job-level, and never the API key.
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        with:
          # Max-subscription auth ONLY. Never add anthropic_api_key here (it would
          # take precedence and bill the paid API). ANTHROPIC_API_KEY is a manual
          # fallback secret, intentionally not wired into this step or the job env.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Execute the RedPxl News DAILY routine exactly as the repo defines it —
            the SAME spec the scheduled cloud routine follows. Read and follow, in order:
              - docs/NORTH-STAR.md   (mission + THE STANDARD — the bar for everything)
              - docs/prompts/daily.md (the canonical daily editorial spec — authoritative
                for WHAT to produce and how)

            Do everything daily.md specifies: read the harvested signal digest
            (scripts/collectors/harvest-digest.md) FIRST and let it steer your leads,
            read team input next (fail-soft), research the last ~24h on the 9-domain
            cadence (incl. the new `news` domain — markets + AI landscape, cross-checked),
            PREPEND one dated daily object to
            reports/data/reports.js WITH its `domains` array (exact existing shape,
            newest first, never overwrite older entries), create/update the durable cards
            in reports/data/cards.js, and update the per-domain digests, predictions, and
            sources — all to THE STANDARD (practical, run-it-today, real links only).

            CI OVERRIDES (only these differ from daily.md's closing steps):
            - Do NOT run scripts/check_reports.py yourself — a later workflow step runs
              the gate (it regenerates all derived files and validates).
            - Do NOT git commit or push — a later workflow step does that.
            Everything else in daily.md still applies.
          # Tool allow-list (comma-separated, no spaces) — without this the action
          # auto-denies file edits in CI. Bash is needed for the feedback-read curl
          # (and weekly's build_report.py). NOT granting git commit/push — the
          # deterministic Commit & push step handles that and the prompt forbids it.
          claude_args: |
            --max-turns 50
            --model claude-opus-4-8
            --allowedTools "Read,Edit,Write,MultiEdit,Bash,WebSearch,WebFetch,Glob,Grep"

      - name: Quality gate — regenerate derived data + validate (FAILS the run if invalid)
        env:
          CHECK_LINKS: "1"   # Phase 2 trust gate: every published link must resolve (404/410 fails)
        run: python scripts/check_reports.py "$(date -u +'%Y-%m-%d')"

      # Embed the published cards + reports into pgvector so /api/ask (Phase 4) can
      # retrieve over our OWN base. Idempotent (only re-embeds changed items).
      # FAIL-SOFT — without DATABASE_URL/OPENAI_API_KEY it skips.
      - name: Embed knowledge base for Ask (RAG)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pip install --quiet "psycopg[binary]" || echo "psycopg install issue — continuing"
          python scripts/collectors/embed_kb.py || echo "kb embed failed — continuing fail-soft"

      - name: Commit & push
        env:
          # claude-code-action clears the checkout-persisted credential, so the push
          # must re-authenticate explicitly with the native token.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AI Edge Bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — nothing to commit."; exit 0
          fi
          git add -A
          git commit -m "daily: AI briefing for $(date -u +'%Y-%m-%d')"
          # Push with rebase-and-retry: if main moved ahead mid-run (e.g. the other
          # workflow landed a commit), fetch + rebase onto it and retry instead of
          # failing on a non-fast-forward.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          for attempt in 1 2 3; do
            git fetch origin "${{ github.ref_name }}"
            git rebase "origin/${{ github.ref_name }}" || { git rebase --abort; echo "rebase conflict — failing safely"; exit 1; }
            git push origin HEAD:"${{ github.ref_name }}" && { echo "pushed"; exit 0; }
            echo "push attempt $attempt rejected, retrying..."; sleep 5
          done
          echo "push failed after retries"; exit 1

      # Measurement (substrate): snapshot one row/day to redpxl.metrics so the system's size +
      # the signal real use generates becomes a curve, not a guess. cards/reports counted from the
      # gate-regenerated derived files; signals/feedback/ratings/outcomes/open-gaps from the DB.
      # FAIL-SOFT (no-op without DATABASE_URL or before 006_brain.sql is live); never blocks a run.
      - name: Snapshot daily metrics to Brain (fail-soft)
        if: ${{ always() }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install --quiet "psycopg[binary]" || echo "psycopg install issue — continuing fail-soft"
          python scripts/collectors/metrics_snapshot.py || echo "metrics snapshot failed — continuing fail-soft"

      # Failure alerting: if a SCHEDULED (unattended) run fails at ANY step above, open
      # a tracking issue assigned to the repo owner so the failure isn't silent (e.g.
      # 2026-06-12 failed with no alert). Uses the built-in GITHUB_TOKEN (issues: write)
      # — no new secret. Never runs on success or on a manual workflow_dispatch.
      - name: Alert on scheduled-run failure (open a GitHub issue)
        if: ${{ failure() && github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="$(date -u +'%Y-%m-%d')"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="$(printf 'The scheduled **%s** run failed — the briefing may not have published.\n\n- Date (UTC): %s\n- Failed run: %s\n\ncc @%s — check the run log. The quality gate now hard-fails on a stale or missing entry instead of shipping nothing silently.' "${{ github.workflow }}" "$DATE" "$RUN_URL" "${{ github.repository_owner }}")"
          gh issue create --repo "${{ github.repository }}" --title "${{ github.workflow }} failed — ${DATE}" --assignee "${{ github.repository_owner }}" --body "$BODY" || echo "alert: could not open the tracking issue"
