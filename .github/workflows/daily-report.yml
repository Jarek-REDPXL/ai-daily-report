name: Daily AI Briefing

# SCHEDULE DISABLED. Daily generation is handled by the Claude "AI NEWS" routine
# (free under your Max plan) which commits straight to this repo. This workflow is
# an OPTIONAL manual-only backup. It authenticates with the Claude Code OAuth token
# (CLAUDE_CODE_OAUTH_TOKEN secret) so a run bills the Max subscription, NOT the paid
# API. AUTH GUARDRAIL: wire ONLY claude_code_oauth_token into the Claude step — do
# NOT add anthropic_api_key there, and do NOT put ANTHROPIC_API_KEY in the job env;
# if the API key is present it takes precedence and billing goes to the paid API.
# The ANTHROPIC_API_KEY secret stays in the repo as a manual fallback only.
# To use this backup: add the CLAUDE_CODE_OAUTH_TOKEN secret and run it from the
# Actions tab. To re-enable the schedule, restore:
#   schedule:
#     - cron: "0 6 * * *"   # 06:00 UTC ≈ 07:00 Europe/London
on:
  workflow_dispatch:        # run on-demand from the Actions tab

permissions:
  contents: write           # needed so the workflow can commit the new report

concurrency:
  group: ai-edge-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF deps
        run: pip install --quiet reportlab

      - name: Generate today's briefing with Claude
        uses: anthropics/claude-code-action@v1
        with:
          # Max-subscription auth ONLY. Never add anthropic_api_key here (it would
          # take precedence and bill the paid API). ANTHROPIC_API_KEY is a manual
          # fallback secret, intentionally not wired into this step or the job env.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Follow the instructions in docs/prompts/daily.md to produce TODAY's
            daily report for "The AI Edge".

            Hard requirements:
            - Use web search to gather AI news from the last ~24 hours.
            - Cross-check surprising figures against a second source; mark
              fast-moving/forward-looking numbers as directional.
            - PREPEND one new report object to the array in
              reports/data/reports.js (newest first). Do NOT delete or overwrite
              existing reports. Keep the exact object shape used by the existing
              entries so the site renders it.
            - Set type:"daily", today's date as sortDate (YYYY-MM-DD), a
              dateLabel, a 3-5 bullet tldr, and tight sections.
            - Validate the file is still valid JavaScript after editing.
            Do NOT git commit or push — a later workflow step handles that.
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6

      - name: Commit & push
        run: |
          git config user.name "AI Edge Bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — nothing to commit."; exit 0
          fi
          git add -A
          git commit -m "daily: AI briefing for $(date -u +'%Y-%m-%d')"
          git push origin "${{ github.ref_name }}"
