name: Weekly AI Briefing

# SCHEDULE DISABLED. The weekly edition is produced by the Claude "AI NEWS"
# routine on MONDAYS (covering the prior full Mon–Sun week; free under Max) and
# committed to this repo. This workflow is an OPTIONAL manual-only backup. It
# authenticates with the Claude Code OAuth token (CLAUDE_CODE_OAUTH_TOKEN secret)
# so a run bills the Max subscription, NOT the paid API. AUTH GUARDRAIL: wire ONLY
# claude_code_oauth_token into the Claude step — do NOT add anthropic_api_key there,
# and do NOT put ANTHROPIC_API_KEY in the job env; if the API key is present it takes
# precedence and billing goes to the paid API. The ANTHROPIC_API_KEY secret stays in
# the repo as a manual fallback only. To re-enable the schedule, restore:
#   schedule:
#     - cron: "0 7 * * 1"   # Monday 07:00 UTC (for the week just ended)
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-edge-weekly
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF deps
        run: pip install --quiet reportlab

      - name: Generate the weekly briefing with Claude
        uses: anthropics/claude-code-action@v1
        with:
          # Max-subscription auth ONLY. Never add anthropic_api_key here (it would
          # take precedence and bill the paid API). ANTHROPIC_API_KEY is a manual
          # fallback secret, intentionally not wired into this step or the job env.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Follow the instructions in docs/prompts/weekly.md to produce the
            WEEKLY report for "The AI Edge".

            Hard requirements:
            - Review the daily reports already in reports/data/reports.js for the
              past week, and run fresh web searches to fill gaps.
            - Cross-check funding/valuation/acquisition/benchmark numbers; mark
              fast-moving or forward-looking figures as directional.
            - PREPEND one new report object (type:"weekly") to the array in
              reports/data/reports.js, matching the existing object shape. Do NOT
              overwrite older reports.
            - Update build_report.py's content to match the new weekly report,
              then run `python3 build_report.py` to regenerate the PDF into
              reports/pdf/, and set the new object's `pdf:` field to that file.
            - Validate reports/data/reports.js is still valid JavaScript.
            Do NOT git commit or push — a later workflow step handles that.
          claude_args: |
            --max-turns 40
            --model claude-sonnet-4-6

      - name: Commit & push
        run: |
          git config user.name "AI Edge Bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — nothing to commit."; exit 0
          fi
          git add -A
          git commit -m "weekly: AI briefing for week ending $(date -u +'%Y-%m-%d')"
          git push origin "${{ github.ref_name }}"
