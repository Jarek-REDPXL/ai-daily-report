name: Weekly AI Briefing

# SCHEDULE DISABLED (manual-only). The weekly edition is normally produced by the
# Claude "AI NEWS" cloud routine on MONDAYS (free under Max). This workflow is an
# OPTIONAL manual backup that runs the SAME spec (docs/NORTH-STAR.md +
# docs/prompts/weekly.md), regenerates the weekly PDF, then runs the project quality
# gate (scripts/check_reports.py) so it can NEVER publish broken/stale derived data.
#
# AUTH GUARDRAIL: the Claude step authenticates with claude_code_oauth_token
# (CLAUDE_CODE_OAUTH_TOKEN) so a run bills the Max subscription, NOT the paid API.
# Wire ONLY the OAuth token — do NOT add anthropic_api_key to the step and do NOT put
# ANTHROPIC_API_KEY in the job env; if the API key is present it takes precedence and
# billing goes to the paid API. ANTHROPIC_API_KEY stays a manual fallback secret.
#
# Secrets needed: CLAUDE_CODE_OAUTH_TOKEN (auth) + CRON_SECRET (feedback-read).
# To re-enable the schedule later, restore:
#   schedule:
#     - cron: "0 7 * * 1"   # Monday 07:00 UTC (for the week just ended)
on:
  workflow_dispatch:

permissions:
  contents: write           # native GITHUB_TOKEN push to the run's branch
  id-token: write           # lets claude-code-action fetch its OIDC token

concurrency:
  group: ai-edge-weekly
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PDF deps
        run: pip install --quiet reportlab

      - name: Generate the weekly briefing with Claude
        uses: anthropics/claude-code-action@v1
        env:
          # Lets weekly.md's feedback-read (via the shared spec) call /api/intake
          # (Bearer). Step-scoped ONLY — never job-level, and never the API key.
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        with:
          # Max-subscription auth ONLY. Never add anthropic_api_key here (it would
          # take precedence and bill the paid API). ANTHROPIC_API_KEY is a manual
          # fallback secret, intentionally not wired into this step or the job env.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Execute the RedPxl News WEEKLY routine exactly as the repo defines it —
            the SAME spec the scheduled cloud routine follows. Read and follow, in order:
              - docs/NORTH-STAR.md    (mission + THE STANDARD — the bar for everything)
              - docs/prompts/weekly.md (the canonical weekly synthesis spec — authoritative)

            Do everything weekly.md specifies: synthesize the week just ended across the
            domains that moved, PREPEND one type:"weekly" object to reports/data/reports.js
            WITH its `domains` array (exact existing shape, never overwrite older entries;
            weekly sortDate = that week's Sunday), run `python3 build_report.py` to
            regenerate the weekly PDF into reports/pdf/ and set the object's `pdf` field,
            and update the per-domain digests, predictions, and sources — all to THE
            STANDARD (practical, real links only).

            CI OVERRIDES (only these differ from weekly.md's closing steps):
            - Do NOT run scripts/check_reports.py yourself — a later workflow step runs
              the gate (it regenerates all derived files and validates).
            - Do NOT git commit or push — a later workflow step does that.
            Everything else in weekly.md still applies.
          # Tool allow-list (comma-separated, no spaces) — without this the action
          # auto-denies file edits in CI. Bash is needed for build_report.py and the
          # feedback-read curl. NOT granting git commit/push — the deterministic
          # Commit & push step handles that and the prompt forbids it.
          claude_args: |
            --max-turns 60
            --model claude-opus-4-8
            --allowedTools "Read,Edit,Write,MultiEdit,Bash,WebSearch,WebFetch,Glob,Grep"

      - name: Quality gate — regenerate derived data + validate (FAILS the run if invalid)
        run: python scripts/check_reports.py

      - name: Commit & push
        env:
          # claude-code-action clears the checkout-persisted credential, so the push
          # must re-authenticate explicitly with the native token.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AI Edge Bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — nothing to commit."; exit 0
          fi
          git add -A
          git commit -m "weekly: AI briefing for week ending $(date -u +'%Y-%m-%d')"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:"${{ github.ref_name }}"
