<!DOCTYPE html>

<head>

<div id="progressbar"></div>

<header class="topbar">

        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>

        <h1>The&nbsp;AI&nbsp;Edge</h1>

      </div>
    </div>
    <div class="topbar-meta">

      <button id="theme-toggle" title="Toggle light/dark" aria-label="Toggle theme">🌙</button>

      <span>The Archive</span>

  <div class="scrim" id="scrim"></div>

  <main id="report-container">
    <div class="loading">Loading reports…</div>
  </main>
</div>

<footer class="site-footer">

    <span class="footer-brand"><span class="footer-mark" aria-hidden="true"></span> The AI Edge</span>
    <span class="footer-note">An automated intelligence briefing · figures for fast-moving deals are directional.</span>
    <span class="footer-count" id="report-count"></span>
  </div>
</footer>

<script src="reports/data/reports.js"></script>
<script src="assets/app.js"></script>

</html>
