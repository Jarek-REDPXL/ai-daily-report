<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedPxl News — AI Intelligence</title>
<meta name="description" content="RedPxl News — daily &amp; weekly AI intelligence. Signal over noise.">
<meta name="theme-color" content="#0A0D12">
<meta name="color-scheme" content="dark light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230A0D12'/><rect x='60' y='60' width='26' height='26' fill='%23FF2F2B'/></svg>">
<script>
  // No-flash theme init — RedPxl defaults to dark (white logo on midnight).
  (function(){var t=localStorage.getItem("redpxl-theme");
   if(t==="light"){document.documentElement.setAttribute("data-theme","light");}
  })();
</script>
</head>
<body>
<div id="progressbar"></div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <button id="menu-btn" aria-label="Toggle archive" title="Toggle archive">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <a class="brand-logo" href="#" aria-label="RedPxl News — home">
        <img class="logo-img logo-dark" src="assets/whitelogo.png" alt="RedPxl" width="118" height="22">
        <img class="logo-img logo-light" src="assets/blacklogo.png" alt="RedPxl" width="118" height="22">
      </a>
      <span class="brand-divider" aria-hidden="true"></span>
      <p class="tagline">AI&nbsp;Intelligence <span class="tagline-sub">— daily &amp; weekly</span></p>
    </div>
    <div class="topbar-meta">
      <span class="pill" id="latest-pill">Loading…</span>
      <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span>The Archive</span>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="search" placeholder="Filter editions…" aria-label="Filter reports">
      </div>
    </div>
    <nav id="archive-nav"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main id="report-container">
    <div class="loading">Loading reports…</div>
  </main>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <a class="footer-brand" href="https://redpxl.uk" target="_blank" rel="noopener">
      <img class="logo-img logo-dark" src="assets/whitelogo.png" alt="RedPxl" width="96" height="18">
      <img class="logo-img logo-light" src="assets/blacklogo.png" alt="RedPxl" width="96" height="18">
    </a>
    <span class="footer-note">An automated AI intelligence briefing · figures for fast-moving deals are directional.</span>
    <span class="footer-count" id="report-count"></span>
  </div>
</footer>

<script src="reports/data/reports.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
